services:
  app:
    build: .
    container_name: invoice-backend
    ports:
      - "5000:5000"

    volumes:
      - ./src/temp:/app/src/temp
      - paddle_data:/home/appuser/.paddleocr

    environment:
      PORT: 5000
      AI_MODEL: openai/gpt-4o-mini
      OPENROUTER_API_KEY: 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

      # ✅ ADD THESE FOR DATABASE
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: invoice_db

    depends_on:
      - mysql

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

  # ✅ NEW MYSQL SERVICE
  mysql:
    image: mysql:8
    container_name: invoice-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invoice_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: invoice-adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  paddle_data:
  mysql_data: